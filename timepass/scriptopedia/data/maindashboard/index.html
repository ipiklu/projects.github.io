<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSS-Dashboard</title>
    <link rel = "icon" href="img/s.gif" type="image/x-icon">
    <link rel="stylesheet" href="css/googleapi.css">
    <script src="js/lucide.min.js"></script>
    <script src="js/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img alt="logo" src="img/s.gif" class="imgS"/>
                    <span>UPSS-Dash</span>
                </div>
                <button id="sidebar-toggle" class="icon-btn">
                    <i data-lucide="menu"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" data-page="Overview" title="Overview">
                    <i data-lucide="layout-grid"></i><span>Overview</span>
                </a>
                <a href="#" class="nav-link" data-page="Provisioning" title="Provisioning">
                    <i data-lucide="folder-open"></i><span>Provisioning</span>
                </a>
                <a href="#" class="nav-link" data-page="IR" title="IR">
                    <i data-lucide="folder-kanban"></i><span>IR</span>
                </a>
                <a href="#" class="nav-link" data-page="Config" title="Config">
                    <i data-lucide="settings"></i><span>Config</span>
                </a>
                <a href="#" class="nav-link" data-page="SME" title="SME">
                    <i data-lucide="settings-2"></i><span>SME</span>
                </a>
                <a href="#" class="nav-link" data-page="NCC" title="NCC">
                    <i data-lucide="activity"></i><span>NCC</span>
                </a>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="top-bar">
                <div class="header-left">
                    <div class="search-container">
                        <input type="text" id="global-search" placeholder="&#x1F50D; Search components...">
                    </div>
                </div>

                <div class="header-right">
                    <nav class="top-nav">
                        <a title="Open-Documents-Page" onClick="window.open('topbarlinks/docs.html', target='_blank', 'fullscreen, scrollbar');">Docs</a>
                        <a title="Open-Support-Page" onClick="window.open('topbarlinks/support.html', target='_blank', 'fullscreen, scrollbar');">Support</a>
                        <a title="Open-Changelog-Page" onClick="window.open('topbarlinks/changelog.html', target='_blank', 'fullscreen, scrollbar');">Changelog</a>
                    </nav>
                    <button class="btn btn-primary capture-btn" onClick="downloadScreenshot()">Screeshot</button>
                </div>
            </header>

            <div class="content-area">
                <header class="page-title">
                    <h1 id="dynamic-title">Overview</h1>
                </header>

                <div class="grid-layout" id="main-grid">
                    </div>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
