<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <title>Network Mesh Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-zone { display: none !important; }
        body { background: #05070a; color: #94a3b8; font-family: ui-monospace, monospace; padding: 20px; scrollbar-width: none; }
        .source-card { transition: all 0.3s ease; }
        .target-box { transition: all 0.2s; }
        .target-box:hover { transform: scale(1.1); background: #000 !important; z-index: 10; border-color: #e0a419 !important; }
        
        /* Zone View / Big Mode Layout */
        .big-mode-grid { display: flex !important; flex-direction: column !important; gap: 40px !important; }
        .big-mode .target-grid { grid-template-columns: repeat(6, 1fr) !important; }
        .big-mode .source-card { border-width: 2px; border-color: #1e293b; }
    </style>
</head>
<body>
    <div class="flex flex-col lg:flex-row justify-between items-center mb-8 pb-6 border-b border-slate-900 gap-4">
        <div>
            <h1 class="text-sm font-black tracking-[0.4em] text-slate-500 uppercase">NETWORK <span class="text-yellow-600">COMMAND</span></h1>
            <div class="text-[10px] mt-1 font-bold">
                <span class="text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded">{total_up} UP</span>
                <span class="text-rose-500 bg-rose-500/10 px-2 py-0.5 rounded ml-2">{total_down} DOWN</span>
            </div>
        </div>

        <input type="text" id="searchInput" onkeyup="applyFilter()" placeholder="SEARCH IP OR NODE..." 
               class="bg-white px-4 py-2 rounded text-xs text-black font-bold outline-none w-64 uppercase border-2 border-slate-900 focus:border-yellow-600 transition-colors">

        <div class="flex gap-2">
            <select id="typeFilter" onchange="applyFilter()" class="bg-black border border-slate-800 text-yellow-500 text-[10px] p-2 rounded uppercase font-bold outline-none cursor-pointer hover:border-slate-600">
                <option value="ALL">ALL TYPES</option>
                <option value="HLR">HLR</option>
                <option value="AIR">AIR</option>
                <option value="INUM">INUM</option>
            </select>
            <select id="zoneFilter" onchange="applyFilter()" class="bg-black border border-slate-800 text-yellow-500 text-[10px] p-2 rounded uppercase font-bold outline-none cursor-pointer hover:border-slate-600">
                <option value="ALL">COMPACT VIEW</option>
                <option value="Z1">ZONE 1</option>
                <option value="Z2">ZONE 2</option>
                <option value="Z3">ZONE 3</option>
                <option value="Z4">ZONE 4</option>
            </select>
            <div class="text-yellow-700 font-bold text-xs p-2 tabular-nums border-l border-slate-900 ml-2">{timestamp}</div>
        </div>
    </div>

    <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
        {cards}
    </div>

    <script>
        function applyFilter() {
            const selectedZone = document.getElementById('zoneFilter').value;
            const selectedType = document.getElementById('typeFilter').value;
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('cardGrid');
            const cards = document.querySelectorAll('.source-card');

            // Save choice so it doesn't reset on refresh
            localStorage.setItem('activeZone', selectedZone);
            localStorage.setItem('activeType', selectedType);

            // Change grid layout if a specific Zone is picked
            if (selectedZone === 'ALL') {
                grid.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6";
            } else {
                grid.className = "big-mode-grid big-mode";
            }

            cards.forEach(card => {
                const cardZone = card.getAttribute('data-zone');
                const nodeName = card.getAttribute('data-node');
                const sections = card.querySelectorAll('.category-section');
                
                // Rule 1: Does the card match the Zone?
                const isZoneMatch = (selectedZone === 'ALL' || cardZone === selectedZone);
                
                let cardHasVisibleContent = false;

                sections.forEach(sec => {
                    const secCat = sec.getAttribute('data-category');
                    // Rule 2: Does this section match the Type filter?
                    const isTypeMatch = (selectedType === 'ALL' || secCat === selectedType);
                    
                    if (isTypeMatch) {
                        const targets = sec.querySelectorAll('.target-box');
                        let sectionHasSearchMatch = false;

                        targets.forEach(t => {
                            const searchInfo = t.getAttribute('data-search');
                            const isSearchMatch = searchInfo.includes(searchQuery) || nodeName.includes(searchQuery);
                            
                            // Dim the target if it doesn't match search, but keep it there
                            t.style.opacity = (searchQuery === "" || isSearchMatch) ? "1" : "0.1";
                            if (isSearchMatch) sectionHasSearchMatch = true;
                        });

                        // Show section only if type matches and search matches (or search is empty)
                        const shouldShowSection = (searchQuery === "" || sectionHasSearchMatch || nodeName.includes(searchQuery));
                        sec.style.display = shouldShowSection ? "block" : "none";
                        
                        if (shouldShowSection) cardHasVisibleContent = true;
                    } else {
                        sec.style.display = "none";
                    }
                });

                // Final Card Visibility: Must match Zone AND have content inside
                const finalVisible = isZoneMatch && cardHasVisibleContent;
                card.classList.toggle('hidden-zone', !finalVisible);
            });
        }

        // Restore filters on page load
        window.onload = () => {
            const z = localStorage.getItem('activeZone');
            const t = localStorage.getItem('activeType');
            if (z) document.getElementById('zoneFilter').value = z;
            if (t) document.getElementById('typeFilter').value = t;
            applyFilter();
        };
    </script>
</body>
</html>
