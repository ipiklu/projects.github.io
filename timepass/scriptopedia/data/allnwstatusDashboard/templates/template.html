<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <title>NOC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #94a3b8; font-family: ui-monospace, monospace; padding: 20px; scrollbar-width: none; }
        .hidden-zone { display: none !important; }

        /* Network Headings with Counts */
        .network-heading {
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em;
            text-align: center; color: white; background: rgba(255, 255, 255, 0.07);
            padding: 8px 0; margin: 15px 0; border-radius: 4px; display: flex; justify-content: center; align-items: center;
        }
        .section-counter { letter-spacing: normal; font-weight: bold; }

        /* Target Cards */
        .target-box {
            background: rgba(0,0,0,0); border: 1px none; border-radius: 4px;
            padding: 6px; height: 46px; display: flex; flex-direction: column;
            justify-content: center; transition: all 0.2s; position: relative;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
	}
        .target-box[data-status="UP"] { border-left: 3px solid #10b981; background: rgba(16, 185, 129, 0.05); }
        .target-box[data-status="UP"] .status-indicator { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .target-box[data-status="DOWN"] { border-left: 3px solid #f43f5e; background: rgba(244, 63, 94, 0.05); }
        .target-box[data-status="DOWN"] .status-indicator { background: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
        .target-box:hover { 
		transform: scale(1.7); z-index: 50; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); cursor: pointer;
		background-color: rgba(0, 0, 0, 0.2); animation: animated-border-glow 8s infinite linear;
	}
	.target-box:active {
		transform: scale(0.98); box-shadow: 3px 2px 22px 1px rgba(0, 0, 0, 0.24); /*Lowering the shadow*/
	}

        .target-label { font-size: 9px; font-weight: bold; color: white; display: block; overflow: hidden; text-overflow: ellipsis; }
        .target-subtext { font-size: 7px; color: #64748b; margin-top: 2px; }
        .status-indicator { width: 7px; height: 7px; border-radius: 50%; }
        .target-header { display: flex; justify-content: space-between; align-items: center; }

        .source-card { background: rgba(15, 23, 42, 0.6); border: 1px solid #1e293b; padding: 15px; border-radius: 8px; }
        .node-header { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; margin-bottom: 15px; padding-bottom: 5px; }
        .node-title { color: #e0a419; font-weight: bold; font-size: 13px; }
        .node-meta { font-size: 9px; color: #475569; font-weight: bold; }
        .target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .big-mode-grid { display: flex !important; flex-direction: column !important; gap: 30px; }
        .big-mode .target-grid { grid-template-columns: repeat(6, 1fr) !important; }
	input[type="text"]{
		border: 1px none; border-radius: 10px; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
	}
	input[type="text"]:hover {
		transform: scale(1.07); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); color:#E59E11; cursor: text; background-color: rgba(0, 0, 0, 0.2); animation: animated-border-glow 8s infinite linear;
	}
	input[type="text"]:active {
		transform: scale(0.98); box-shadow: 3px 2px 22px 1px rgba(0, 0, 0, 0.24); /*Lowering the shadow*/
	}
	.dropdown {
		border: 1px none; outline: none; background: #121212; color: #E59E11; border-radius: 5em; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
		
	}
	.dropdown:hover {
		transform: scale(1.01); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); cursor: pointer; background: #121212; color: #E59E11; animation: animated-border-glow 8s infinite linear;
	}
	.dropdown:active {
		transform: scale(0.98); box-shadow: 3px 2px 22px 1px rgba(0, 0, 0, 0.24); /*Lowering the shadow*/
	}
/* MOBILE OPTIMIZATION MEDIA QUERY */
@media screen and (max-width: 768px) {
    /* Stack grid to 1 column for better touch targets */
    .target-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }

    /* Prevent scale from overlapping nearby elements on touch */
    .target-box:hover {
        transform: scale(1.02);
    }

    /* Increase hit area for inputs and prevent iOS auto-zoom */
    input[type="text"], .dropdown {
        font-size: 16px !important;
        padding: 12px;
        width: 100%;
    }

    /* Ensure background containers have enough breathing room */
    body {
        padding: 15px;
        -webkit-overflow-scrolling: touch;
    }

    /* Adjust box height for better readability on narrow screens */
    .target-box {
        height: auto;
        padding: 12px 10px;
    }
}		
/* Keyframes for the new animated border glow */
@keyframes animated-border-glow {
    0% {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1),
                    0 0 10px rgba(100, 100, 255, 0.7); /* Blue */
    }
    25% {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1),
                    0 0 10px rgba(100, 255, 100, 0.7); /* Green */
    }
    50% {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1),
                    0 0 10px rgba(255, 100, 100, 0.7); /* Red */
    }
    75% {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1),
                    0 0 10px rgba(255, 255, 100, 0.7); /* Yellow */
    }
    100% {
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1),
                    0 0 10px rgba(100, 100, 255, 0.7); /* Blue (back to start) */
    }
}
    </style>
</head>
<body>
    <div class="flex flex-col lg:flex-row justify-between items-center mb-8 pb-6 border-b border-slate-900 gap-4">
        <div>
            <h1 class="text-sm font-black tracking-[0.4em] text-slate-500 uppercase">NETWORK <span class="text-yellow-600">COMMAND</span></h1>
            <div class="text-[10px] mt-1 font-bold">
                <span id="countUp" class="text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded">0 UP</span>
                <span id="countDown" class="text-rose-500 bg-rose-500/10 px-2 py-0.5 rounded ml-2">0 DOWN</span>
            </div>
        </div>

        <input type="text" id="searchInput" onkeyup="applyFilter()" placeholder="SEARCH..." class="bg-white px-4 py-2 rounded text-xs text-black font-bold outline-none w-64 uppercase border-2 border-slate-900" autocomplete="off">

        <div class="flex gap-2">
            <select id="typeFilter" onchange="applyFilter()" class="dropdown bg-black border border-slate-800 text-yellow-500 text-[10px] p-2 rounded uppercase font-bold outline-none cursor-pointer">
                <option value="ALL">ALL TYPES</option>
                <option value="HLR">HLR</option>
                <option value="AIR">AIR</option>
                <option value="INUM">INUM</option>
            </select>
            <select id="zoneFilter" onchange="applyFilter()" class="dropdown bg-black border border-slate-800 text-yellow-500 text-[10px] p-2 rounded uppercase font-bold outline-none cursor-pointer">
                <option value="ALL">COMPACT VIEW</option>
                <option value="Z1">ZONE 1</option>
                <option value="Z2">ZONE 2</option>
                <option value="Z3">ZONE 3</option>
                <option value="Z4">ZONE 4</option>
            </select>
            <div class="text-yellow-700 font-bold text-xs p-2 tabular-nums">{timestamp}</div>
        </div>
    </div>

    <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
        {cards}
    </div>
<div align="right" class="text-yellow-700 font-bold text-xs p-2 tabular-nums">{timestamp}</div>
<hr style="width:100%; height:1px; background-color: #fff; border: none; border-radius:5px;">
<p align="left">Intelectual Property (IP) Protected &copysr; <script>document.write(new Date().getFullYear())</script>, All Rights Not Reserved</p>
      <script>
        function applyFilter() {
            const searchInput = document.getElementById('searchInput');
	    const selectedZone = document.getElementById('zoneFilter').value;
            const selectedType = document.getElementById('typeFilter').value;
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('cardGrid');
            const cards = document.querySelectorAll('.source-card');

            let totalVisibleUp = 0;
            let totalVisibleDown = 0;
		
	    localStorage.setItem('savedSearch', searchQuery);
            localStorage.setItem('savedZone', selectedZone);
            localStorage.setItem('savedType', selectedType);

            grid.className = selectedZone === 'ALL' ? "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6" : "big-mode-grid big-mode";

            cards.forEach(card => {
                const cardZone = card.getAttribute('data-zone');
                const nodeName = card.getAttribute('data-node');
                const isZoneMatch = (selectedZone === 'ALL' || cardZone === selectedZone);
                
                const sections = card.querySelectorAll('.category-section');
                let cardHasVisibleContent = false;

                sections.forEach(sec => {
                    const secCat = sec.getAttribute('data-category');
                    const isTypeMatch = (selectedType === 'ALL' || secCat === selectedType);
                    
                    let secUp = 0, secDown = 0;
                    
                    if (isTypeMatch) {
                        const targets = sec.querySelectorAll('.target-box');
                        let sectionHasSearchMatch = false;

                        targets.forEach(t => {
                            const status = t.getAttribute('data-status');
                            const match = t.getAttribute('data-search').includes(searchQuery) || nodeName.includes(searchQuery);
                            t.style.opacity = (searchQuery === "" || match) ? "1" : "0.1";
                            
                            if (match && isZoneMatch) {
                                sectionHasSearchMatch = true;
                                if (status === "UP") { secUp++; totalVisibleUp++; }
                                else { secDown++; totalVisibleDown++; }
                            }
                        });

                        // Update the network heading text with counts
                        const counterSpan = sec.querySelector('.section-counter');
                        if(counterSpan) {
                            counterSpan.innerHTML = `(<span class="text-emerald-500">${secUp}</span>|<span class="text-rose-500">${secDown}</span>)`;
                        }

                        const showSec = (searchQuery === "" || sectionHasSearchMatch || nodeName.includes(searchQuery));
                        sec.style.display = showSec ? "block" : "none";
                        if (showSec) cardHasVisibleContent = true;
                    } else {
                        sec.style.display = "none";
                    }
                });
                card.classList.toggle('hidden-zone', !isZoneMatch || !cardHasVisibleContent);
            });

            document.getElementById('countUp').innerText = `${totalVisibleUp} UP`;
            document.getElementById('countDown').innerText = `${totalVisibleDown} DOWN`;
        }

        window.onload = function() {
	    const s = localStorage.getItem('savedSearch');
            const z = localStorage.getItem('savedZone');
            const t = localStorage.getItem('savedType');

	    if (s) searchInput.value = s; // Restore text
            if (z) document.getElementById('zoneFilter').value = z; // Restore dropdown
            if (t) document.getElementById('typeFilter').value = t; // Restore dropdown 
            
	    // 2. NEW FEATURE: Auto-focus when mouse enters the search box
        	searchInput.addEventListener("mouseenter", function() {
            		searchInput.focus();
        	});

	    applyFilter();
        };
    </script>
</body>
</html>
