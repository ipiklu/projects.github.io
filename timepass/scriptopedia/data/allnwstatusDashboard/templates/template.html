<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ultra Compact Monitor</title>
    <style>
        @keyframes pulse-soft {{ 0%, 100% {{ opacity: 1; }} 50% {{ opacity: 0.3; }} }}
        .animate-pulse {{ animation: pulse-soft 2s infinite; }}
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-mono p-2 lg:p-4 overflow-x-hidden">
    <div class="max-w-full mx-auto">
        
        <div class="bg-indigo-950 px-3 py-1 border-b border-yellow-500 flex justify-between items-center mb-2">
            <h1 class="text-xs font-black uppercase text-white tracking-widest">Network Cluster Status</h1>
            <span class="text-[9px] text-yellow-500 font-bold">{timestamp}</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            {cards}
        </div>

        <div class="mt-4 text-[8px] text-slate-600 text-center uppercase tracking-widest">
            Node: {hostname}
        </div>
    </div>
</body>
</html>
