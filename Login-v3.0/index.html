<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightlamp Login</title>
    <link rel = "icon" href="img/s.gif" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css" />
    <script src="css/cdn.tailwind.css"></script>
    <!---Alert--->
	<link rel="stylesheet" href="../alertify.js-0.3.11/themes/alertify.core.css" />
	<link rel="stylesheet" href="../alertify.js-0.3.11/themes/alertify.default.css" />
    <script src="../alertify.js-0.3.11/lib/alertify.min.js"></script>  
</head>
<body>
<a href="../index.html" title="Home"><img alt="logo" src="img/s.gif" class="s-logo"/></a>
<div class="flex items-center justify-center min-h-screen">

    <!-- The Lamp -->
    <div class="lamp-container">
        <div class="lamp-shade"></div>
        <div class="pull-cord" id="cord">
            <div class="pull-knob"></div>
        </div>
    </div>
    <div class="hint">Pull the cord to light up</div>

    <div class="lamp-glow"></div>

    <!-- Login Container (Hidden when light is off) -->
    <div class="login-container relative z-10 w-full max-w-md mx-4">
        <div class="glass-card p-10 rounded-3xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-2 index"  onclick="return(reloadClear());" title="Reload" style="cursor:pointer;">Midnight Portal</h1>
                <p class="text-gray-400 text-sm">Welcome back to your sanctuary</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2">Username</label>
                    <input type="text" class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="Username" required>
                </div>

                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2">Password</label>
                    <input type="password" class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-glow w-full py-3 rounded-xl text-gray-900 font-bold text-lg uppercase tracking-wider">
                    Sign In
                </button>
            </form>
        </div>
        <br />
<!-------Footer------------------------------------------>  
<footer align="center" style="position:relative; font-size:15px; color:#ffd27d; bottom: 0; width: 100%;">
<center> <font color="#ffd27d">

   <script>
	document.getElementById("date").innerHTML = Date();
   </script> </font></center>

    <center>
       <span><font style="font-size: 20px;" color="#ffd27d"></font><img alt="about-us-icon" src="img/LOADING.gif" onClick="return(view());" title="About Us" style="width:50px; cursor:pointer;"></span>
    </center>  
<!-------Footer-End----------------------------------------->         
    </div>

    <script src="js/script.js"></script>
  </div>  
</body>
</html>
